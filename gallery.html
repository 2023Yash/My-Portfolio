    .gallery {
      width: min(1400px, 95%);
      margin: 60px auto;

      column-count: 4;
      column-gap: 18px;
    }

    .gallery-item {
      break-inside: avoid;
      margin-bottom: 18px;
      overflow: hidden;
      border-radius: 18px;
      background: #212029;
      border: 2px solid transparent;
      transition: .35s;
    }

    .gallery-item img {
      width: 100%;
      display: block;
      transition: .5s;
    }

    .gallery-item:hover {
      transform: translateY(-6px);
      border-color: gold;
      box-shadow: 0 18px 35px rgba(0, 0, 0, .35);
    }

    .gallery-item:hover img {
      transform: scale(1.05);
    }

    @media (max-width:1200px) {
      .gallery {
        column-count: 3;
      }
    }

    @media (max-width:768px) {
      .gallery {
        column-count: 2;
      }
    }

    @media (max-width:500px) {
      .gallery {
        column-count: 1;
      }
    }

    .gallery-item:nth-child(odd) {
      transform: rotate(-0.7deg);
    }

    .gallery-item:nth-child(even) {
      transform: rotate(0.7deg);
    }

    .gallery-item:hover {
      transform: rotate(0deg) scale(1.02);
    }

    footer div::before,
    footer div::after {
      content: "";
      background: gold;
      display: inline-block;
      height: 3px;
      width: 30%;
    }

    footer::before {

      background-color: rgba(223, 182, 219, 0.551);
      display: inline-block;
      height: 0px;
      width: 0px;
      position: absolute;
      z-index: -100;
      animation: glow 2s infinite;
    }

    footer p::before,
    blockquote::before {

      font-family: 'Times New Roman', Times, serif;
      color: gold;
      position: relative;
    }
